<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Ravenswatch Overlay</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100vw;
        height: 100vh;
        background: transparent;
        overflow: hidden;
        font-family: 'Segoe UI', system-ui, sans-serif;
        user-select: none;
      }
      #card {
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        border-radius: 14px;
        background: linear-gradient(160deg, #1c1722 0%, #241a2e 60%, #16121c 100%);
        border: 1px solid rgba(255, 204, 51, 0.4);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        color: #f1e9d8;
      }
      h1 {
        margin: 0;
        font-size: 22px;
        letter-spacing: 0.06em;
      }
      h1 span {
        color: #ffcc33;
      }
      #status {
        font-size: 12px;
        color: #a89f8f;
      }
      .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(255, 204, 51, 0.25);
        border-top-color: #ffcc33;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="card">
      <h1>RAVENSWATCH <span>OVERLAY</span></h1>
      <div class="spinner"></div>
      <div id="status">loading hero &amp; talent data…</div>
    </div>
  </body>
</html>
